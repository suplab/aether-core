name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aether_core_test
          POSTGRES_USER: aether
          POSTGRES_PASSWORD: aether
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        run: mvn -B clean verify --no-transfer-progress
        env:
          POSTGRES_URL: jdbc:postgresql://localhost:5432/aether_core_test
          POSTGRES_USER: aether
          POSTGRES_PASSWORD: aether
          EMBEDDING_ENABLED: "false"

      - name: Upload JaCoCo coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jacoco-report
          path: '**/target/site/jacoco/'
          retention-days: 7

      - name: Upload Surefire test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: surefire-reports
          path: '**/target/surefire-reports/'
          retention-days: 7
