apiVersion: v1
kind: Service
metadata:
  name: aether-core
  namespace: aether-core
  labels:
    app: aether-core
    app.kubernetes.io/name: aether-core
    app.kubernetes.io/part-of: aether
spec:
  type: ClusterIP
  selector:
    app: aether-core
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aether-core
  namespace: aether-core
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aether-core
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aether-core
  namespace: aether-core
  labels:
    app.kubernetes.io/name: aether-core
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: aether-core-config
  namespace: aether-core
data:
  ollama-base-url: "http://ollama:11434"
  kafka-bootstrap-servers: "kafka:9092"
  embedding-enabled: "true"
  embedding-model: "all-minilm"
  context-memory-limit: "5"
  memory-decay-factor: "0.05"
  memory-purge-threshold: "0.05"
  memory-idle-threshold-days: "7"
---
# Template only — never commit actual values
# kubectl create secret generic aether-core-secrets \
#   --from-literal=postgres-url=jdbc:postgresql://... \
#   --from-literal=postgres-user=aether \
#   --from-literal=postgres-password=<secret>
apiVersion: v1
kind: Secret
metadata:
  name: aether-core-secrets
  namespace: aether-core
type: Opaque
data: {}  # Populated externally — never in source control
