spring:
  application:
    name: aether-core
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/aether_core}
    username: ${POSTGRES_USER:aether}
    password: ${POSTGRES_PASSWORD:aether}
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8082}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

aether:
  core:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    embedding:
      enabled: ${EMBEDDING_ENABLED:true}
      model: ${EMBEDDING_MODEL:all-minilm}
    context:
      memory-limit: ${CONTEXT_MEMORY_LIMIT:5}
    memory:
      decay:
        factor: ${MEMORY_DECAY_FACTOR:0.05}
        purge-threshold: ${MEMORY_PURGE_THRESHOLD:0.05}
        idle-threshold-days: ${MEMORY_IDLE_THRESHOLD_DAYS:7}
        cron: ${MEMORY_DECAY_CRON:"0 0 2 * * *"}
        purge-cron: ${MEMORY_PURGE_CRON:"0 0 3 * * SUN"}
    kafka:
      enabled: ${KAFKA_ENABLED:false}
      feedback-topic: ${KAFKA_FEEDBACK_TOPIC:aether.core.feedback}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP:aether-core}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
